# Triggers:
# - Push a git tag → build and push image (<tag> and latest)
# - workflow_dispatch → optional version input or latest (manual)

name: Build

permissions:
  contents: read

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag (empty = latest)'
        required: false
        default: ''
        type: string

env:
  GCR_REGISTRY: ${{ vars.GCR_REGISTRY }}
  IMAGE_NAME: amneziavpn/mtproxy

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      should_push: ${{ steps.version.outputs.should_push }}
    steps:
      - name: Set version tag
        id: version
        run: |
          VERSION="latest"
          SHOULD_PUSH="false"

          if [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            SHOULD_PUSH="true"
            VERSION="${GITHUB_REF#refs/tags/}"
          fi

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            SHOULD_PUSH="true"
            if [ -n "${{ inputs.version }}" ]; then
              VERSION="${{ inputs.version }}"
            fi
          fi

          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "should_push=$SHOULD_PUSH" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Login to Docker Hub
        if: ${{ needs.get-version.outputs.should_push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Google Container Registry
        if: ${{ needs.get-version.outputs.should_push == 'true' && vars.GCR_REGISTRY != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCR_REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}

      - name: Setup metadata for Docker Hub
        uses: docker/metadata-action@v5
        id: metadata_dockerhub
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.get-version.outputs.tag }}
            type=raw,value=latest

      - name: Setup metadata for GCR
        if: ${{ vars.GCR_REGISTRY != '' }}
        id: metadata_gcr
        run: |
          VERSION="${{ needs.get-version.outputs.tag }}"
          TAGS="${{ env.GCR_REGISTRY }}/mtproxy:${VERSION},${{ env.GCR_REGISTRY }}/mtproxy:latest"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set cache scope
        id: cache
        run: echo "scope=${{ github.workflow }}" >> "$GITHUB_OUTPUT"

      - name: Build and push to Docker Hub
        if: ${{ needs.get-version.outputs.should_push == 'true' }}
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          push: true
          tags: ${{ steps.metadata_dockerhub.outputs.tags }}
          labels: ${{ steps.metadata_dockerhub.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ steps.cache.outputs.scope }}-main
            type=gha,scope=${{ steps.cache.outputs.scope }}-pr
          cache-to: type=gha,scope=${{ steps.cache.outputs.scope }}-main,mode=min

      - name: Build and push to GCR
        if: ${{ needs.get-version.outputs.should_push == 'true' && vars.GCR_REGISTRY != '' }}
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          push: true
          tags: ${{ steps.metadata_gcr.outputs.tags }}
          cache-from: |
            type=gha,scope=${{ steps.cache.outputs.scope }}-main
            type=gha,scope=${{ steps.cache.outputs.scope }}-pr
          cache-to: type=gha,scope=${{ steps.cache.outputs.scope }}-main,mode=min

      - name: Build only (no push)
        if: ${{ needs.get-version.outputs.should_push != 'true' }}
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          push: false
          cache-from: |
            type=gha,scope=${{ steps.cache.outputs.scope }}-pr
            type=gha,scope=${{ steps.cache.outputs.scope }}-main
          cache-to: type=gha,scope=${{ steps.cache.outputs.scope }}-pr,mode=min
